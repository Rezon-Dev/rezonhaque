<!DOCTYPE html>
<html lang="en">
<head>
    <title>REZON HAQUE | Technical Architect & Digital Creator</title>
    <meta name="description" content="Portfolio of Rezon Haque: Student, technical architect, and author of THE VOID. Specializing in hardware optimization and digital creation.">
    <meta name="keywords" content="Rezon Haque, Rezon, Technical Architect, THE VOID book, hardware optimization">
    <link rel="canonical" href="https://rezonhaque.work.gd/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #0071e3;
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navbar */
        .glass-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            z-index: 9999;
        }

        /* left section: hamburger + logo */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* ===== HAMBURGER (3 BARS) ===== */
        .hamburger-trigger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            z-index: 10001;
            position: relative;
        }
        .hamburger-trigger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--text);
            border-radius: 4px;
            transition: 0.2s;
        }

        /* side navigation container (hover zone) */
        .side-nav-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .side-nav-menu {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            background: rgba(8, 8, 12, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-radius: 0 16px 16px 0;
            padding: 28px 0 32px 0;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10000;
            box-shadow: 12px 0 32px rgba(0,0,0,0.6);
        }
        /* on hover of the trigger area, show menu */
        .side-nav-container:hover .side-nav-menu {
            transform: translateX(0);
        }
        /* optional: keep menu visible if hovering the menu itself */
        .side-nav-menu:hover {
            transform: translateX(0);
        }

        .side-nav-menu ul {
            list-style: none;
            padding: 0 24px;
        }
        .side-nav-menu li {
            margin: 28px 0;
        }
        .side-nav-menu a {
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--dim);
            text-decoration: none;
            transition: 0.2s;
            display: block;
            padding: 6px 0;
            border-bottom: 1px solid transparent;
        }
        .side-nav-menu a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
            transform: translateX(6px);
        }

        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: var(--dim); 
            font-size: 11px; font-weight: 700; transition: 0.3s; 
        }
        .nav-links a:hover { color: var(--accent); }

        /* Content Container */
        .story-container {
            max-width: 700px;
            margin: 120px auto 0 auto;
            padding: 0 20px;
        }

        /* Profile Header */
        .profile-header { text-align: center; margin-bottom: 100px; }
        
        .photo-wrapper {
            width: 220px; height: 220px; margin: 0 auto 30px auto;
            border: 1px solid var(--border); border-radius: 4px;
            padding: 10px; background: var(--glass);
        }
        .photo-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%); transition: 0.5s;
        }
        .photo-wrapper:hover img { filter: grayscale(0%); }

        .main-name {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900; letter-spacing: -4px;
            text-transform: uppercase; line-height: 0.8;
            margin-bottom: 40px;
        }

        .about-btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            background: transparent;
        }
        .about-btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(0, 113, 227, 0.4);
            transform: translateY(-2px);
        }

        /* Story Sections (home view) */
        .log-entry {
            margin-bottom: 100px; padding-left: 25px;
            border-left: 1px solid var(--border); position: relative;
            scroll-margin-top: 120px;
        }
        .timestamp {
            font-family: 'Fira Code', monospace; color: var(--accent);
            font-size: 11px; display: block; margin-bottom: 15px;
        }
        h2 { font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 20px; opacity: 0.9; }

        /* Typography base */
        .story-content p {
            font-size: 1.1rem; color: var(--dim);
            text-align: justify; min-height: 1.5em;
            opacity: 0; 
        }
        .cursor {
            display: inline-block; width: 8px; height: 1.1em;
            background-color: var(--accent); margin-left: 4px;
            animation: blink 1s step-end infinite; vertical-align: middle;
        }
        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: var(--accent); }
        }

        /* Special Typing Page (About) */
        .typing-page {
            padding: 20px 0 60px 0;
        }
        .typing-line {
            font-size: 1.15rem;
            color: var(--dim);
            margin-bottom: 28px;
            line-height: 1.7;
            border-left: 2px solid var(--accent);
            padding-left: 24px;
        }
        .back-home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 48px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 10px 22px;
            transition: 0.2s;
        }
        .back-home-link:hover {
            background: rgba(0,113,227,0.1);
            border-color: var(--accent);
        }

        /* Contact Card */
        .contact-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px 32px;
            border-radius: 12px;
            text-align: center;
            margin: 30px 0;
        }
        .contact-handle {
            font-size: 1rem;
            font-family: 'Fira Code', monospace;
            color: var(--dim);
            margin-bottom: 28px;
            letter-spacing: 1px;
        }
        .insta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #f09433 0%, #d62976 50%, #962fbf 100%);
            border: none;
            padding: 14px 34px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .insta-button:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
        }

        /* Footer */
        .tech-footer {
            max-width: 700px; margin: 150px auto 50px auto;
            padding: 0 20px; border-top: 1px solid var(--border);
            padding-top: 30px;
        }
        .footer-content {
            display: flex; justify-content: space-between;
            font-family: 'Fira Code', monospace; font-size: 10px; color: var(--dim);
        }
        .online-pulse {
            color: #00ff41; text-shadow: 0 0 5px #00ff41;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .main-name { font-size: 4rem; }
            .nav-links { display: none; }
            .side-nav-menu { width: 260px; }
        }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-left">
        <!-- 3 BARS + HOVER SIDE NAVBAR -->
        <div class="side-nav-container">
            <div class="hamburger-trigger">
                <span></span><span></span><span></span>
            </div>
            <div class="side-nav-menu">
                <ul>
                    <li><a href="#" id="side-home-link">🏠 HOME</a></li>
                    <li><a href="#" id="side-about-link">📖 ABOUT ME (typing effect)</a></li>
                    <li><a href="#" id="side-contact-link">📬 CONTACT ME</a></li>
                </ul>
            </div>
        </div>
        <div class="logo">RH<span>.ARCH</span></div>
    </div>
    <div class="nav-links">
        <a href="#about">ABOUT</a>
        <a href="#story">STORY</a>
        <a href="mailto:rezon@rhx.io">CONTACT</a>
    </div>
</nav>

<div class="story-container">
    <header class="profile-header">
        <div class="photo-wrapper">
            <img src="Rezon.jpeg" alt="Rezon Haque">
        </div>
        <h1 class="main-name">REZON<br>HAQUE</h1>
        <a href="#about" class="about-btn">[VIEW_MANIFESTO]</a>
    </header>

    <!-- dynamic content will be injected here -->
    <main id="dynamic-story" class="story-content">
        <!-- original home content injected via JS to maintain clean state -->
    </main>
</div>

<footer class="tech-footer">
    <div class="footer-content">
        <p>&copy; 2026 // REZON HAQUE</p>
        <p>SYSTEM_STATUS: <span class="online-pulse">STABLE</span></p>
    </div>
</footer>

<script>
    // --------------------------------------------------------------
    // 1. ORIGINAL HOME HTML (preserve all original texts)
    // --------------------------------------------------------------
    const getHomeHTML = () => `
        <section class="log-entry" id="about">
            <span class="timestamp">[SYSTEM_INFO_LOAD]</span>
            <h2>00. THE_ARCHITECT</h2>
            <p>Technical architect, digital creator, and author. I operate at the intersection of raw hardware performance and high-level digital philosophy. From optimizing low-end systems to drafting "THE VOID," my goal is absolute efficiency.</p>
        </section>
        <section class="log-entry" id="story">
            <span class="timestamp">[BOOT_SEQUENCE_SUCCESS]</span>
            <h2>01. ORIGIN_CODE</h2>
            <p>Born into a world of predefined interfaces, I chose the command line. My architecture was built in the silence of the Class 8 barracks, where I realized that hardware is just a mirror of the soul. I don't follow the path; I write the script.</p>
        </section>
        <section class="log-entry">
            <span class="timestamp">[HARDWARE_STRESS_TEST]</span>
            <h2>02. 4GB_REALITY</h2>
            <p>They said the memory was blown, that the system was capped at 2GB. I took the alcohol, I took the friction, and I reclaimed the physical space. Now running 4GB stable with 5.5GB zRAM. Efficiency is my religion. Independence is my OS.</p>
        </section>
        <section class="log-entry">
            <span class="timestamp">[PROCESSED_LOG: THE_VOID]</span>
            <h2>03. PHILOSOPHY_ENGINE</h2>
            <p>Inside "THE VOID," I am crafting a memoir of the silicon age. It's not just writing; it's data persistence. A philosophical manuscript for those who feel the hum of the motherboard. RHX Enterprises is the network. I am the Root.</p>
        </section>
    `;

    // --------------------------------------------------------------
    // ABOUT TYPING PAGE (JS typing effect with scroll reveal style)
    // --------------------------------------------------------------
    const getAboutTypingHTML = () => `
        <div class="typing-page">
            <div class="log-entry" style="border-left-color: var(--accent);">
                <span class="timestamp">[WHOAMI.EXE]</span>
                <h2>// ABOUT_ME: BOOTING NARRATIVE</h2>
                <div id="about-typing-container">
                    <div class="typing-line" data-type="0">>_ REZON HAQUE — technical architect, writer, hardware alchemist.</div>
                    <div class="typing-line" data-type="1">>_ I don’t just build systems — I decode their soul. From raw silicon to abstract philosophy, my craft is efficiency.</div>
                    <div class="typing-line" data-type="2">>_ Author of "THE VOID": a manuscript that fuses cyberpunk realism with human emotion. Printed in the circuitry of dreams.</div>
                    <div class="typing-line" data-type="3">>_ my current stack: low-level memory recovery, zRAM sorcery, and bleeding-edge digital resilience. Every bottleneck is a riddle.</div>
                    <div class="typing-line" data-type="4">>_ mission: rewrite the architecture of what a creator can be. hardware independent, philosophy infinite.</div>
                </div>
                <a href="#" id="about-back-home" class="back-home-link">⌂ RETURN_TO_HOME</a>
            </div>
        </div>
    `;

    // Contact page HTML with Instagram button (handle @rezon.5839)
    const getContactHTML = () => `
        <div class="typing-page">
            <div class="log-entry" style="border-left-color: var(--accent);">
                <span class="timestamp">[CONNECT_INTERFACE]</span>
                <h2>// CONTACT_SIGNAL</h2>
                <div class="contact-card">
                    <div class="contact-handle">[ DIGITAL_FOOTPRINT ]</div>
                    <a href="https://www.instagram.com/rezon.5839/" target="_blank" rel="noopener noreferrer" class="insta-button">
                        📸 INSTAGRAM : @rezon.5839
                    </a>
                    <div style="margin-top: 32px; font-size: 12px; font-family: 'Fira Code', monospace; color: var(--dim);">
                        open direct channel | creative inquiries | collaboration matrix
                    </div>
                </div>
                <a href="#" id="contact-back-home" class="back-home-link">⌂ RETURN_TO_HOME</a>
            </div>
        </div>
    `;

    // --------------------------------------------------------------
    // GLOBALS & HELPERS
    // --------------------------------------------------------------
    let activeIntersectionObserver = null;   // to clean up previous observers
    let currentTypingInterval = null;

    // stop any ongoing typewriter timers
    function stopActiveTyping() {
        if (currentTypingInterval) {
            clearInterval(currentTypingInterval);
            currentTypingInterval = null;
        }
    }

    // clean previous intersection observer (for home paragraphs typing)
    function disconnectObserver() {
        if (activeIntersectionObserver) {
            activeIntersectionObserver.disconnect();
            activeIntersectionObserver = null;
        }
    }

    // typewriter for about page: lines appear one by one with character effect
    function startAboutTypewriter() {
        const container = document.getElementById('about-typing-container');
        if (!container) return;
        const lines = Array.from(container.querySelectorAll('.typing-line'));
        if (lines.length === 0) return;
        
        // reset all lines as empty, store full text
        lines.forEach(line => {
            const rawText = line.innerText;
            line.setAttribute('data-fulltext', rawText);
            line.innerText = '';
            line.style.opacity = '1';
        });
        
        let lineIndex = 0;
        let charIndex = 0;
        let currentLine = lines[lineIndex];
        if (!currentLine) return;
        
        const fullCurrent = currentLine.getAttribute('data-fulltext') || '';
        
        function typeNextChar() {
            if (lineIndex >= lines.length) {
                // after finishing all, optionally add final cursor effect? keep stable
                if (currentTypingInterval) clearInterval(currentTypingInterval);
                currentTypingInterval = null;
                // add elegant persistent cursor on last line maybe
                const lastLine = lines[lines.length-1];
                if (lastLine && !lastLine.querySelector('.cursor')) {
                    const cursorSpan = document.createElement('span');
                    cursorSpan.className = 'cursor';
                    lastLine.appendChild(cursorSpan);
                }
                return;
            }
            
            const currentLineElem = lines[lineIndex];
            const fullText = currentLineElem.getAttribute('data-fulltext') || '';
            
            if (charIndex < fullText.length) {
                currentLineElem.innerText = fullText.substring(0, charIndex + 1);
                charIndex++;
            } else {
                // move to next line
                lineIndex++;
                charIndex = 0;
                if (lineIndex < lines.length) {
                    // add small pause between lines
                    // no extra action, just continue
                } else {
                    // finished
                    if (currentTypingInterval) clearInterval(currentTypingInterval);
                    currentTypingInterval = null;
                    const finalLast = lines[lines.length-1];
                    if (finalLast && !finalLast.querySelector('.cursor')) {
                        const cursorSpan = document.createElement('span');
                        cursorSpan.className = 'cursor';
                        finalLast.appendChild(cursorSpan);
                    }
                    return;
                }
            }
        }
        
        stopActiveTyping();
        currentTypingInterval = setInterval(typeNextChar, 35);
    }

    // original home typing effect: intersection observer based (like original but robust)
    function initHomeTypingObserver() {
        const container = document.getElementById('dynamic-story');
        if (!container) return;
        const paragraphs = container.querySelectorAll('p');
        paragraphs.forEach(p => {
            // prevent duplicate data attribute & reset content
            if (!p.getAttribute('data-original')) {
                const originalText = p.innerText;
                p.setAttribute('data-original', originalText);
                p.innerText = '';
                p.style.opacity = "0";
            } else {
                const orig = p.getAttribute('data-original');
                p.innerText = '';
                p.style.opacity = "0";
            }
        });
        
        disconnectObserver();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const p = entry.target;
                    if (p.innerText === '' && p.getAttribute('data-original')) {
                        const fullText = p.getAttribute('data-original');
                        typeParagraph(p, fullText);
                        observer.unobserve(p);
                    }
                }
            });
        }, { threshold: 0.4 });
        
        paragraphs.forEach(p => {
            observer.observe(p);
        });
        activeIntersectionObserver = observer;
    }
    
    function typeParagraph(element, text) {
        let i = 0;
        element.style.opacity = "1";
        const timer = setInterval(() => {
            if (i < text.length) {
                element.innerHTML = text.charAt(i);
                i++;
            } else {
                clearInterval(timer);
                element.innerHTML = text + '<span class="cursor">|</span>';
            }
        }, 28);
    }
    
    // Render home view fully
    function renderHome() {
        const dynamicContainer = document.getElementById('dynamic-story');
        if (!dynamicContainer) return;
        dynamicContainer.innerHTML = getHomeHTML();
        // reinitialize typing observer for home paragraphs
        initHomeTypingObserver();
        // also re-bind anchor in-page? optional keep smooth scroll
        const manifestoBtn = document.querySelector('.about-btn');
        if (manifestoBtn) {
            manifestoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const aboutSection = document.getElementById('about');
                if (aboutSection) aboutSection.scrollIntoView({ behavior: 'smooth' });
            });
        }
    }
    
    // Render About Typing Page
    function renderAbout() {
        const dynamicContainer = document.getElementById('dynamic-story');
        if (!dynamicContainer) return;
        dynamicContainer.innerHTML = getAboutTypingHTML();
        disconnectObserver(); // kill home observer
        stopActiveTyping();
        // start typing effect for about lines
        setTimeout(() => {
            startAboutTypewriter();
        }, 80);
        // back to home button handling
        const backBtn = document.getElementById('about-back-home');
        if (backBtn) {
            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                renderHome();
            });
        }
    }
    
    // Render Contact Page (Instagram button)
    function renderContact() {
        const dynamicContainer = document.getElementById('dynamic-story');
        if (!dynamicContainer) return;
        dynamicContainer.innerHTML = getContactHTML();
        disconnectObserver();
        stopActiveTyping();
        // extra security: Instagram button link uses proper handle @rezon.5839
        const instaBtn = document.querySelector('.insta-button');
        if (instaBtn) {
            // ensure correct href (already set in HTML)
            instaBtn.setAttribute('href', 'https://www.instagram.com/rezon.5839/');
            instaBtn.setAttribute('target', '_blank');
        }
        const backContactBtn = document.getElementById('contact-back-home');
        if (backContactBtn) {
            backContactBtn.addEventListener('click', (e) => {
                e.preventDefault();
                renderHome();
            });
        }
    }
    
    // ----- SIDE MENU INTERACTIONS (preserve hover behavior + link actions) -----
    function bindSideMenuLinks() {
        const homeLink = document.getElementById('side-home-link');
        const aboutLink = document.getElementById('side-about-link');
        const contactLink = document.getElementById('side-contact-link');
        if (homeLink) {
            homeLink.addEventListener('click', (e) => {
                e.preventDefault();
                renderHome();
                // optional: close side menu after click (menu vanishes naturally on mouseleave)
            });
        }
        if (aboutLink) {
            aboutLink.addEventListener('click', (e) => {
                e.preventDefault();
                renderAbout();
            });
        }
        if (contactLink) {
            contactLink.addEventListener('click', (e) => {
                e.preventDefault();
                renderContact();
            });
        }
    }
    
    // also the existing [VIEW_MANIFESTO] button (scroll to about)
    function attachManifestoScroll() {
        const manifestoBtn = document.querySelector('.about-btn');
        if (manifestoBtn) {
            manifestoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const targetAbout = document.getElementById('about');
                // but if we are not on home view? only works on home view, but we can ensure if some other view active, renderHome first?
                // for consistency, we first check if home loaded -> scroll; else switch to home then scroll.
                const currentStory = document.getElementById('dynamic-story');
                const isHomeView = currentStory && currentStory.querySelector('.log-entry#about') !== null;
                if (!isHomeView) {
                    renderHome();
                    setTimeout(() => {
                        const aboutEl = document.getElementById('about');
                        if (aboutEl) aboutEl.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                } else {
                    const aboutEl = document.getElementById('about');
                    if (aboutEl) aboutEl.scrollIntoView({ behavior: 'smooth' });
                }
            });
        }
    }
    
    // also fix side menu hover persists after link click - we keep default behavior fine.
    // Ensure original integrity: preserve all content and match theme.
    function init() {
        renderHome();   // load default home view
        bindSideMenuLinks();
        attachManifestoScroll();
        // also handle existing nav links? keep but redirect to hash doesn't break, but we enhance to ensure home view if not present
        const navAbout = document.querySelector('.nav-links a[href="#about"]');
        const navStory = document.querySelector('.nav-links a[href="#story"]');
        if (navAbout) {
            navAbout.addEventListener('click', (e) => {
                e.preventDefault();
                const currentViewHasAbout = document.getElementById('dynamic-story')?.querySelector('#about');
                if (!currentViewHasAbout) renderHome();
                setTimeout(() => {
                    document.getElementById('about')?.scrollIntoView({ behavior: 'smooth' });
                }, 80);
            });
        }
        if (navStory) {
            navStory.addEventListener('click', (e) => {
                e.preventDefault();
                const currentViewHasStory = document.getElementById('dynamic-story')?.querySelector('#story');
                if (!currentViewHasStory) renderHome();
                setTimeout(() => {
                    document.getElementById('story')?.scrollIntoView({ behavior: 'smooth' });
                }, 80);
            });
        }
        // preserve original contact email link
        const contactNav = document.querySelector('.nav-links a[href="mailto:rezon@rhx.io"]');
        if (contactNav) contactNav.setAttribute('href', 'mailto:rezon@rhx.io');
    }
    
    // run when DOM ready
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
