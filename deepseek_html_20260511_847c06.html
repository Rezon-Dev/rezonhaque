<!DOCTYPE html>
<html lang="en">
<head>
    <title>REZON HAQUE | Technical Architect & Digital Creator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Rezon Haque: technical architect, author of THE VOID, hardware optimization, and cyberpunk philosophy.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========= LOADING SCREEN ========= */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            backdrop-filter: blur(4px);
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(0,113,227,0.2);
            border-top: 3px solid #0071e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loader-text {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            background: rgba(0,113,227,0.1);
            padding: 8px 18px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* glass navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 999;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .hamburger-area {
            position: relative;
        }

        .hamburger {
            width: 28px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .hamburger span {
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: 0.2s;
        }

        .side-menu {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(24px);
            border-right: 1px solid rgba(255,255,255,0.12);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            border-radius: 0 16px 16px 0;
            padding: 32px 0;
            transform: translateX(-100%);
            transition: transform 0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 1000;
            box-shadow: 6px 0 28px rgba(0,0,0,0.5);
        }

        .hamburger-area:hover .side-menu {
            transform: translateX(0);
        }

        .side-menu ul {
            list-style: none;
            padding: 0 28px;
        }

        .side-menu li {
            margin: 28px 0;
        }

        .side-menu a {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.2px;
        }

        .side-menu a:hover {
            color: #0071e3;
            transform: translateX(8px);
            text-shadow: 0 0 5px rgba(0,113,227,0.4);
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -1px;
        }

        .logo span {
            color: #0071e3;
        }

        .nav-right a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            margin-left: 28px;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .nav-right a:hover {
            color: #0071e3;
        }

        .container {
            max-width: 780px;
            margin: 120px auto 0;
            padding: 0 24px;
            transition: all 0.2s;
        }

        .profile {
            text-align: center;
            margin-bottom: 70px;
            transition: opacity 0.25s ease, transform 0.2s;
        }
        .profile.hidden-profile {
            display: none;
        }

        .photo {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 2px;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.4s ease;
        }

        .photo:hover img {
            filter: grayscale(0);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -4px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 30px;
            background: linear-gradient(125deg, #fff, #7b9eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .btn {
            display: inline-block;
            padding: 10px 28px;
            border: 1px solid #0071e3;
            color: #0071e3;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            background: transparent;
            cursor: pointer;
        }

        .btn:hover {
            background: #0071e3;
            color: white;
            box-shadow: 0 0 18px rgba(0,113,227,0.4);
            border-color: #0071e3;
        }

        .log {
            margin-bottom: 70px;
            padding-left: 24px;
            border-left: 1px solid rgba(255,255,255,0.12);
        }

        .time {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: #0071e3;
            margin-bottom: 16px;
            display: block;
            letter-spacing: 0.5px;
        }

        h2 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .typing-paragraph {
            color: rgba(255,255,255,0.75);
            font-size: 1rem;
            line-height: 1.65;
            min-height: 1.6em;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #0071e3;
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .typing-page {
            padding: 20px 0;
        }

        .typing-line {
            font-size: 1rem;
            color: rgba(255,255,255,0.75);
            margin-bottom: 28px;
            border-left: 2px solid #0071e3;
            padding-left: 22px;
            font-family: 'Fira Code', monospace;
        }

        .contact-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            margin: 30px 0;
            backdrop-filter: blur(4px);
        }

        .insta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #f09433, #d62976, #962fbf);
            padding: 12px 32px;
            border-radius: 48px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .insta-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 22px rgba(0,0,0,0.3);
        }

        /* project specific cards */
        .project-item {
            margin-bottom: 2rem;
            border-left: 2px solid rgba(0,113,227,0.4);
            transition: 0.2s;
        }
        .project-item:hover {
            border-left-color: #0071e3;
            padding-left: 6px;
        }
        .project-link-btn {
            margin-top: 16px;
        }
        .loading-projects {
            font-family: 'Fira Code', monospace;
            color: #0071e3;
            padding: 2rem 0;
            text-align: center;
        }

        footer {
            max-width: 780px;
            margin: 100px auto 40px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.35);
            display: flex;
            justify-content: space-between;
        }

        .status {
            color: #00ff41;
            text-shadow: 0 0 3px #00ff41;
        }

        @media (max-width: 600px) {
            .nav-right { display: none; }
            .side-menu { width: 250px; }
            .container { padding: 0 20px; }
            .log { padding-left: 16px; }
        }

        /* glow details */
        .btn-outline-glow {
            box-shadow: 0 0 6px rgba(0,113,227,0.3);
        }
        ::selection {
            background: #0071e3;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loader-ring"></div>
    <div class="loader-text">⟁ BOOTING SYSTEM ⟁</div>
</div>

<nav class="navbar">
    <div class="nav-left">
        <div class="hamburger-area">
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
            <div class="side-menu">
                <ul>
                    <li><a href="#" id="nav-home">🏠 HOME</a></li>
                    <li><a href="#" id="nav-about">📖 ABOUT ME (typing effect)</a></li>
                    <li><a href="#" id="nav-projects">🗂️ PROJECTS / MANIFESTS</a></li>
                    <li><a href="#" id="nav-contact">📬 CONTACT ME</a></li>
                </ul>
            </div>
        </div>
        <div class="logo">RH<span>.ARCH</span></div>
    </div>
    <div class="nav-right">
        <a href="#" id="top-home">HOME</a>
        <a href="#" id="top-about">ABOUT</a>
        <a href="#" id="top-projects">PROJECTS</a>
        <a href="#" id="top-contact">CONTACT</a>
    </div>
</nav>

<div class="container">
    <div class="profile" id="profileSection">
        <div class="photo">
            <img src="Rezon.jpeg" alt="Rezon Haque" onerror="this.src='https://placehold.co/200x200/1a1a2e/white?text=REZON+ARCH'">
        </div>
        <h1>REZON<br>HAQUE</h1>
        <a href="#" class="btn" id="manifesto-btn">[VIEW_MANIFESTO]</a>
    </div>
    <div id="dynamic-content"></div>
</div>

<footer>
    <span>© 2026 // REZON HAQUE // RHX_ENTERPRISES</span>
    <span>SYSTEM_STATUS: <span class="status">STABLE</span></span>
</footer>

<script>
    // ---------- GLOBALS ----------
    let activeObserver = null;
    let activeTypingTimers = [];
    let aboutTypingInterval = null;

    // Helper: clear all ongoing typing timers
    function clearAllTyping() {
        activeTypingTimers.forEach(timer => clearInterval(timer));
        activeTypingTimers = [];
    }

    function stopAboutTyping() {
        if (aboutTypingInterval) {
            clearInterval(aboutTypingInterval);
            aboutTypingInterval = null;
        }
    }

    // Profile visibility control
    const profileDiv = document.getElementById('profileSection');
    function setProfileVisible(visible) {
        if (!profileDiv) return;
        if (visible) {
            profileDiv.classList.remove('hidden-profile');
        } else {
            profileDiv.classList.add('hidden-profile');
        }
    }

    // Smooth typing per element promise-based
    function typeText(element, text, speed = 24) {
        return new Promise((resolve) => {
            let i = 0;
            element.textContent = '';
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    const cursorSpan = document.createElement('span');
                    cursorSpan.className = 'cursor';
                    element.appendChild(cursorSpan);
                    resolve();
                }
            }, speed);
            activeTypingTimers.push(timer);
        });
    }

    // HOME PAGE (typing with intersection observer)
    const homeHTML = `
        <div class="log" id="about-sec">
            <span class="time">[SYSTEM_INFO_LOAD]</span>
            <h2>00. THE_ARCHITECT</h2>
            <p class="typing-paragraph" data-text="Technical architect, digital creator, and author. I operate at the intersection of raw hardware performance and high-level digital philosophy. From optimizing low-end systems to drafting 'THE VOID,' my goal is absolute efficiency."></p>
        </div>
        <div class="log">
            <span class="time">[BOOT_SEQUENCE_SUCCESS]</span>
            <h2>01. ORIGIN_CODE</h2>
            <p class="typing-paragraph" data-text="Born into a world of predefined interfaces, I chose the command line. My architecture was built in the silence of the Class 8 barracks, where I realized that hardware is just a mirror of the soul. I don't follow the path; I write the script."></p>
        </div>
        <div class="log">
            <span class="time">[HARDWARE_STRESS_TEST]</span>
            <h2>02. 4GB_REALITY</h2>
            <p class="typing-paragraph" data-text="They said the memory was blown, that the system was capped at 2GB. I took the alcohol, I took the friction, and I reclaimed the physical space. Now running 4GB stable with 5.5GB zRAM. Efficiency is my religion. Independence is my OS."></p>
        </div>
        <div class="log">
            <span class="time">[PROCESSED_LOG: THE_VOID]</span>
            <h2>03. PHILOSOPHY_ENGINE</h2>
            <p class="typing-paragraph" data-text="Inside 'THE VOID,' I am crafting a memoir of the silicon age. It's not just writing; it's data persistence. A philosophical manuscript for those who feel the hum of the motherboard. RHX Enterprises is the network. I am the Root."></p>
        </div>
    `;

    function initHomeTyping() {
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        const paragraphs = Array.from(container.querySelectorAll('.typing-paragraph'));
        if (paragraphs.length === 0) return;
        paragraphs.forEach(p => {
            const originalText = p.getAttribute('data-text');
            if (originalText) {
                p.textContent = '';
                p.style.opacity = '1';
            }
        });
        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const p = entry.target;
                    const text = p.getAttribute('data-text');
                    if (text && p.textContent.trim() === '') {
                        typeText(p, text, 22);
                        observer.unobserve(p);
                    }
                }
            });
        }, { threshold: 0.3, rootMargin: "0px 0px -10px 0px" });
        paragraphs.forEach(p => observer.observe(p));
        activeObserver = observer;
    }

    function renderHome() {
        const container = document.getElementById('dynamic-content');
        if (container) container.innerHTML = homeHTML;
        stopAboutTyping();
        clearAllTyping();
        if (activeObserver) activeObserver.disconnect();
        setProfileVisible(true);
        initHomeTyping();
    }

    // ABOUT PAGE (typing line-by-line)
    const aboutHTML = `
        <div class="typing-page">
            <div class="log">
                <span class="time">[ABOUT_BOOT]</span>
                <h2>// REZON_HAQUE //</h2>
                <div id="typing-lines">
                    <div class="typing-line" data-text=">_ Technical architect. Digital creator. Author of THE VOID."></div>
                    <div class="typing-line" data-text=">_ I rebuild hardware from the kernel up — and write philosophy that cuts through silicon."></div>
                    <div class="typing-line" data-text=">_ My workflow: low-end optimization, zRAM sorcery, and absolute efficiency."></div>
                    <div class="typing-line" data-text=">_ THE VOID is my manuscript — a cyberpunk memoir for those who hear the motherboard hum."></div>
                    <div class="typing-line" data-text=">_ Root access: granted. System: independent. Future: unwritten."></div>
                </div>
                <a href="#" class="btn" id="back-home-from-about" style="margin-top: 40px;">⌂ BACK TO HOME</a>
            </div>
        </div>
    `;

    function startAboutTyping() {
        const containerLines = document.getElementById('typing-lines');
        if (!containerLines) return;
        const lines = Array.from(containerLines.querySelectorAll('.typing-line'));
        if (lines.length === 0) return;
        lines.forEach(line => {
            const original = line.getAttribute('data-text');
            if (original) line.textContent = '';
        });
        if (aboutTypingInterval) clearInterval(aboutTypingInterval);
        let lineIndex = 0;
        let charIndex = 0;
        function typeNextChar() {
            if (lineIndex >= lines.length) {
                clearInterval(aboutTypingInterval);
                aboutTypingInterval = null;
                const lastLine = lines[lines.length-1];
                if (lastLine && !lastLine.querySelector('.cursor')) {
                    const cursorSpan = document.createElement('span');
                    cursorSpan.className = 'cursor';
                    lastLine.appendChild(cursorSpan);
                }
                return;
            }
            const line = lines[lineIndex];
            const targetText = line.getAttribute('data-text') || '';
            if (charIndex < targetText.length) {
                line.textContent = targetText.substring(0, charIndex + 1);
                charIndex++;
            } else {
                lineIndex++;
                charIndex = 0;
            }
        }
        aboutTypingInterval = setInterval(typeNextChar, 32);
    }

    function renderAbout() {
        const container = document.getElementById('dynamic-content');
        if (container) container.innerHTML = aboutHTML;
        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();
        stopAboutTyping();
        setProfileVisible(false);
        setTimeout(() => { startAboutTyping(); }, 70);
        const backBtn = document.getElementById('back-home-from-about');
        if (backBtn) backBtn.onclick = (e) => { e.preventDefault(); renderHome(); };
    }

    // ---------- PROJECTS SECTION (dynamic JSON) ----------
    async function renderProjects() {
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        // Show loading state inside projects
        container.innerHTML = `
            <div class="log">
                <span class="time">[PROJECTS_SYNC]</span>
                <h2>⟡ LOADING MANIFEST ⟡</h2>
                <div class="loading-projects">
                    <span>>_ fetching digital archives ...</span>
                    <div style="margin-top:12px;"><div class="loader-ring" style="width:30px;height:30px;border-width:2px;"></div></div>
                </div>
            </div>
        `;
        setProfileVisible(false);
        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();
        stopAboutTyping();

        try {
            const response = await fetch('./list.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const projects = await response.json();
            if (!Array.isArray(projects) || projects.length === 0) {
                container.innerHTML = `
                    <div class="log">
                        <span class="time">[ARCHIVE_EMPTY]</span>
                        <h2>// NO PROJECTS FOUND //</h2>
                        <p>Manifest repository awaiting new blueprints.</p>
                        <a href="#" class="btn" id="back-home-from-projects" style="margin-top: 32px;">⌂ RETURN TO SHELL</a>
                    </div>
                `;
                const backHome = document.getElementById('back-home-from-projects');
                if(backHome) backHome.onclick = (e) => { e.preventDefault(); renderHome(); };
                return;
            }

            let projectsHtml = `
                <div class="log">
                    <span class="time">[PROJECT_MANIFEST]</span>
                    <h2>// DEPLOYED_ARTIFACTS //</h2>
                    <div style="margin-top: 10px;"></div>
            `;
            projects.forEach((proj, idx) => {
                const projectName = proj.name || "Untitled Artifact";
                const description = proj.description || "No description provided.";
                const link = proj.link || "#";
                projectsHtml += `
                    <div class="project-item" style="margin-bottom: 48px;">
                        <span class="time">[0${idx+1}. ${projectName.toUpperCase()}]</span>
                        <p style="color: rgba(255,255,255,0.7); margin: 12px 0;">${description}</p>
                        <a href="${link}" target="_blank" class="btn project-link-btn" style="margin-top: 8px;">⟐ ACCESS / PURCHASE ⟐</a>
                    </div>
                `;
            });
            projectsHtml += `<a href="#" class="btn" id="back-home-from-projects" style="margin-top: 20px;">⌂ BACK TO HOME</a></div>`;
            container.innerHTML = projectsHtml;
            const backHome = document.getElementById('back-home-from-projects');
            if(backHome) backHome.onclick = (e) => { e.preventDefault(); renderHome(); };
        } catch (err) {
            console.error(err);
            container.innerHTML = `
                <div class="log">
                    <span class="time">[ERROR_SYNC]</span>
                    <h2>⚠️ MANIFEST_UNREACHABLE</h2>
                    <p>Unable to load project database. Ensure list.json is present in root directory.</p>
                    <button id="retry-projects" class="btn" style="margin-top: 24px;">⟳ RETRY CONNECTION</button>
                    <a href="#" class="btn" id="back-home-from-projects-error" style="margin-top: 18px; margin-left: 12px;">⌂ HOME</a>
                </div>
            `;
            const retryBtn = document.getElementById('retry-projects');
            if(retryBtn) retryBtn.onclick = (e) => { e.preventDefault(); renderProjects(); };
            const backBtnErr = document.getElementById('back-home-from-projects-error');
            if(backBtnErr) backBtnErr.onclick = (e) => { e.preventDefault(); renderHome(); };
        }
    }

    // CONTACT PAGE
    const contactHTML = `
        <div class="typing-page">
            <div class="log">
                <span class="time">[CONTACT_SIGNAL]</span>
                <h2>// CONNECT_WITH_ME //</h2>
                <div class="contact-card">
                    <p style="font-family: monospace; margin-bottom: 20px;">[ DIGITAL_FOOTPRINT ]</p>
                    <a href="https://www.instagram.com/rezon.5839/" target="_blank" class="insta-btn">
                        📸 INSTAGRAM : @rezon.5839
                    </a>
                    <p style="margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.5);">Creative inquiries | collaboration | direct message</p>
                </div>
                <a href="#" class="btn" id="back-home-from-contact" style="margin-top: 20px;">⌂ BACK TO HOME</a>
            </div>
        </div>
    `;

    function renderContact() {
        const container = document.getElementById('dynamic-content');
        if (container) container.innerHTML = contactHTML;
        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();
        stopAboutTyping();
        setProfileVisible(false);
        const backBtn = document.getElementById('back-home-from-contact');
        if (backBtn) backBtn.onclick = (e) => { e.preventDefault(); renderHome(); };
    }

    // ----- NAVIGATION BINDINGS -----
    function bindNavigation() {
        const navHome = document.getElementById('nav-home');
        const navAbout = document.getElementById('nav-about');
        const navProjects = document.getElementById('nav-projects');
        const navContact = document.getElementById('nav-contact');
        const topHome = document.getElementById('top-home');
        const topAbout = document.getElementById('top-about');
        const topProjects = document.getElementById('top-projects');
        const topContact = document.getElementById('top-contact');
        const manifestoBtn = document.getElementById('manifesto-btn');

        if (navHome) navHome.addEventListener('click', (e) => { e.preventDefault(); renderHome(); });
        if (navAbout) navAbout.addEventListener('click', (e) => { e.preventDefault(); renderAbout(); });
        if (navProjects) navProjects.addEventListener('click', (e) => { e.preventDefault(); renderProjects(); });
        if (navContact) navContact.addEventListener('click', (e) => { e.preventDefault(); renderContact(); });
        if (topHome) topHome.addEventListener('click', (e) => { e.preventDefault(); renderHome(); });
        if (topAbout) topAbout.addEventListener('click', (e) => { e.preventDefault(); renderAbout(); });
        if (topProjects) topProjects.addEventListener('click', (e) => { e.preventDefault(); renderProjects(); });
        if (topContact) topContact.addEventListener('click', (e) => { e.preventDefault(); renderContact(); });
        if (manifestoBtn) manifestoBtn.addEventListener('click', (e) => { e.preventDefault(); renderAbout(); });
    }

    // LOADING SCREEN removal
    window.addEventListener('load', () => {
        const loader = document.getElementById('loadingOverlay');
        if (loader) {
            setTimeout(() => {
                loader.classList.add('fade-out');
                setTimeout(() => { if(loader.parentNode) loader.style.display = 'none'; }, 800);
            }, 500);
        }
        renderHome();
        bindNavigation();
    });
    // Fallback if dynamic content not yet ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            if(!document.getElementById('dynamic-content')?.innerHTML) renderHome();
            bindNavigation();
        });
    } else {
        if(document.getElementById('dynamic-content') && !document.getElementById('dynamic-content').innerHTML) renderHome();
        bindNavigation();
    }
</script>
</body>
</html>
