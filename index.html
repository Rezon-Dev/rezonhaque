<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RH WebOS | Rezon Haque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Bootloader Overlay -->
  <div id="bootscreen">
    <pre id="boot-log"></pre>
  </div>

  <!-- Main Desktop Environment (hidden during boot) -->
  <div id="desktop" class="hidden">
    <!-- Desktop area for icons (optional) -->
    <div id="desktop-area"></div>

    <!-- Taskbar / Dock -->
    <div id="dock">
      <button id="start-btn" title="Start Menu">⚡</button>
      <div id="dock-icons">
        <button class="dock-icon" data-app="void" title="THE VOID">📖</button>
        <button class="dock-icon" data-app="calc" title="Calculator">🔢</button>
        <button class="dock-icon" data-app="terminal" title="Terminal">🖥️</button>
      </div>
      <div id="dock-right">
        <span id="mini-clock">00:00</span>
        <span id="mini-ram">RAM --%</span>
      </div>
    </div>

    <!-- Start Menu Popup -->
    <div id="start-menu" class="popup-menu hidden">
      <div class="menu-header">Rezon Haque Portfolio</div>
      <div class="menu-item" data-action="open-brand" data-brand="rhx">🚀 RHX Enterprises</div>
      <div class="menu-item" data-action="open-brand" data-brand="deshi">👕 Deshi Clothing</div>
      <div class="menu-item" data-action="open-brand" data-brand="rezies">🔌 Rezies Electronics</div>
      <div class="menu-separator"></div>
      <div class="menu-item" data-action="toggle-theme">🌓 Toggle Theme</div>
    </div>

    <!-- Container for all floating windows -->
    <div id="window-container"></div>
  </div>

  <script src="data_viewer.js"></script>
  <script src="system.js"></script>
</body>
</html>
