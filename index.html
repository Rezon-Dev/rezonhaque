<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezon Haque | Author & Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --mute: #666666;
            --border: #eeeeee;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --mute: #888888;
            --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav { 
            width: 100%; height: 70px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 10%; border-bottom: 1px solid var(--border);
        }

        .theme-btn { 
            background: none; border: 1px solid var(--border); 
            color: var(--text); padding: 8px 15px; border-radius: 20px; 
            cursor: pointer; font-size: 0.8rem;
        }

        .container {
            max-width: 800px;
            padding: 100px 20px;
            text-align: center;
        }

        /* --- THE 1:1 CROP LOGIC --- */
        .image-container {
            width: 180px;  /* Set size */
            height: 180px; /* Same as width for 1:1 */
            margin: 0 auto 30px;
            overflow: hidden;
            border-radius: 50%; /* Makes it a circle like toibur.com */
            border: 4px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This crops the image 1:1 automatically */
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .profile-pic:hover { filter: grayscale(0%); transform: scale(1.1); }

        h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 10px; }
        .type-box { font-family: 'Fira Code', monospace; color: var(--mute); margin-bottom: 40px; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { 
            padding: 12px 25px; border-radius: 50px; text-decoration: none; 
            font-weight: 700; transition: 0.3s; font-size: 0.9rem;
        }
        .btn-p { background: var(--text); color: var(--bg); }
        .btn-i { border: 1px solid var(--border); color: var(--text); }
        
        footer { margin-top: 100px; padding: 40px; color: var(--mute); font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:900">RH.DEV</div>
        <button class="theme-btn" id="t-btn">Dark Mode</button>
    </nav>

    <div class="container">
        <div class="image-container">
            <img src="60782.jpeg" alt="Rezon Haque" class="profile-pic">
        </div>

        <h1>Rezon Haque</h1>
        <div class="type-box">I am a <span id="tw"></span></div>

        <div class="btn-group">
            <a href="https://www.instagram.com/rezon.5839" class="btn btn-p" target="_blank">Instagram</a>
            <a href="mailto:your-email@example.com" class="btn btn-i">Contact Me</a>
        </div>
    </div>

    <footer>&copy; 2026 Rezon Haque</footer>

    <script>
        const tw = document.getElementById('tw');
        const ph = ["website developer.", "photo editor.", "video editor.", "AI master."];
        let pI = 0, cI = 0, isD = false;

        function type() {
            const cur = ph[pI];
            tw.textContent = isD ? cur.substring(0, cI--) : cur.substring(0, cI++);
            let s = isD ? 50 : 100;
            if (!isD && cI > cur.length) { s = 2000; isD = true; }
            else if (isD && cI === 0) { isD = false; pI = (pI + 1) % ph.length; s = 500; }
            setTimeout(type, s);
        }

        const tBtn = document.getElementById('t-btn');
        tBtn.onclick = () => {
            const dark = document.documentElement.toggleAttribute('data-theme');
            tBtn.textContent = dark ? 'Light Mode' : 'Dark Mode';
        };

        window.onload = type;
    </script>
</body>
</html>
