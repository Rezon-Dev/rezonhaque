<!DOCTYPE html>
<html lang="en">
<head>
    <title>REZON HAQUE | Technical Architect & Digital Creator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Rezon Haque: technical architect, author of THE VOID, hardware optimization.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.project-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 24px;
    border-radius: 8px;
    transition: 0.3s;
}

.project-card:hover {
    border-color: #0071e3;
    background: rgba(0, 113, 227, 0.05);
}

.project-card h3 {
    font-family: 'Fira Code', monospace;
    font-size: 1.1rem;
    color: #fff;
    margin-bottom: 10px;
}

.project-card p {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 20px;
}
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* glass navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 999;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        /* 3-bar hamburger + hover side menu */
        .hamburger-area {
            position: relative;
        }

        .hamburger {
            width: 28px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .hamburger span {
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: 0.2s;
        }

        .side-menu {
            position: fixed;
            left: 0;
            top: 70px;
            width: 260px;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            border-radius: 0 12px 12px 0;
            padding: 32px 0;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 1000;
        }

        .hamburger-area:hover .side-menu {
            transform: translateX(0);
        }

        .side-menu ul {
            list-style: none;
            padding: 0 24px;
        }

        .side-menu li {
            margin: 28px 0;
        }

        .side-menu a {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: 0.2s;
        }

        .side-menu a:hover {
            color: #0071e3;
            margin-left: 6px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -1px;
        }

        .logo span {
            color: #0071e3;
        }

        .nav-right a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            margin-left: 20px;
            transition: 0.2s;
        }

        .nav-right a:hover {
            color: #0071e3;
        }

        .container {
            max-width: 700px;
            margin: 120px auto 0;
            padding: 0 20px;
        }

        .profile {
            text-align: center;
            margin-bottom: 80px;
        }

        .photo {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            background: rgba(255,255,255,0.03);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.3s;
        }

        .photo:hover img {
            filter: grayscale(0);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -4px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 28px;
            border: 1px solid #0071e3;
            color: #0071e3;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            background: transparent;
            cursor: pointer;
        }

        .btn:hover {
            background: #0071e3;
            color: white;
            box-shadow: 0 0 15px rgba(0,113,227,0.3);
        }

        .log {
            margin-bottom: 80px;
            padding-left: 20px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .time {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: #0071e3;
            margin-bottom: 12px;
            display: block;
        }

        h2 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* typing paragraph styling */
        .typing-paragraph {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            line-height: 1.6;
            min-height: 1.6em;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #0071e3;
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* about typing page */
        .typing-page {
            padding: 20px 0;
        }

        .typing-line {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 24px;
            border-left: 2px solid #0071e3;
            padding-left: 20px;
            font-family: 'Fira Code', monospace;
        }

        .contact-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            margin: 30px 0;
        }

        .insta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #f09433, #d62976, #962fbf);
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .insta-btn:hover {
            transform: scale(1.02);
        }

        footer {
            max-width: 700px;
            margin: 100px auto 40px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            display: flex;
            justify-content: space-between;
        }

        .status {
            color: #00ff41;
            text-shadow: 0 0 3px #00ff41;
        }

        @media (max-width: 600px) {
            .nav-right { display: none; }
            .side-menu { width: 240px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <div class="hamburger-area">
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
            <div class="side-menu">
    <ul>
        <li><a href="#" id="nav-home">🏠 HOME</a></li>
        <li><a href="#" id="nav-projects">🛠️ PROJECTS</a></li> <li><a href="#" id="nav-about">📖 ABOUT ME</a></li>
        <li><a href="#" id="nav-contact">📬 CONTACT ME</a></li>
    </ul>
            </div>
            
        <div class="logo">RH<span>.ARCH</span></div>
    </div>
    <div class="nav-right">
        <a href="#" id="top-home">HOME</a>
        <a href="#" id="top-about">ABOUT</a>
        <a href="#" id="top-contact">CONTACT</a>
    </div>
</nav>

<div class="container">
    <div class="profile">
        <div class="photo">
            <img src="Rezon.jpeg" alt="Rezon Haque" onerror="this.src='https://placehold.co/200x200/333/white?text=REZON'">
        </div>
        <h1>REZON<br>HAQUE</h1>
        <a href="#" class="btn" id="manifesto-btn">[VIEW_MANIFESTO]</a>
    </div>
    <div id="dynamic-content"></div>
</div>

<footer>
    <span>© 2026 // REZON HAQUE</span>
    <span>SYSTEM_STATUS: <span class="status">STABLE</span></span>
</footer>

<script>
    // ----- HOME CONTENT (preserved exactly) -----
    const homeHTML = `
        <div class="log" id="about-sec">
            <span class="time">[SYSTEM_INFO_LOAD]</span>
            <h2>00. THE_ARCHITECT</h2>
            <p class="typing-paragraph" data-text="Technical architect, digital creator, and author. I operate at the intersection of raw hardware performance and high-level digital philosophy. From optimizing low-end systems to drafting 'THE VOID,' my goal is absolute efficiency."></p>
        </div>
        <div class="log">
            <span class="time">[BOOT_SEQUENCE_SUCCESS]</span>
            <h2>01. ORIGIN_CODE</h2>
            <p class="typing-paragraph" data-text="Born into a world of predefined interfaces, I chose the command line. My architecture was built in the silence of the Class 8 barracks, where I realized that hardware is just a mirror of the soul. I don't follow the path; I write the script."></p>
        </div>
        <div class="log">
            <span class="time">[HARDWARE_STRESS_TEST]</span>
            <h2>02. 4GB_REALITY</h2>
            <p class="typing-paragraph" data-text="They said the memory was blown, that the system was capped at 2GB. I took the alcohol, I took the friction, and I reclaimed the physical space. Now running 4GB stable with 5.5GB zRAM. Efficiency is my religion. Independence is my OS."></p>
        </div>
        <div class="log">
            <span class="time">[PROCESSED_LOG: THE_VOID]</span>
            <h2>03. PHILOSOPHY_ENGINE</h2>
            <p class="typing-paragraph" data-text="Inside 'THE VOID,' I am crafting a memoir of the silicon age. It's not just writing; it's data persistence. A philosophical manuscript for those who feel the hum of the motherboard. RHX Enterprises is the network. I am the Root."></p>
        </div>
    `;

    // ----- ABOUT PAGE (fresh typing effect) -----
    const aboutHTML = `
        <div class="typing-page">
            <div class="log">
                <span class="time">[ABOUT_BOOT]</span>
                <h2>// REZON_HAQUE //</h2>
                <div id="typing-lines">
                    <div class="typing-line" data-text=">_ Technical architect. Digital creator. Author of THE VOID."></div>
                    <div class="typing-line" data-text=">_ I rebuild hardware from the kernel up — and write philosophy that cuts through silicon."></div>
                    <div class="typing-line" data-text=">_ My workflow: low-end optimization, zRAM sorcery, and absolute efficiency."></div>
                    <div class="typing-line" data-text=">_ THE VOID is my manuscript — a cyberpunk memoir for those who hear the motherboard hum."></div>
                    <div class="typing-line" data-text=">_ Root access: granted. System: independent. Future: unwritten."></div>
                </div>
                <a href="#" class="btn" id="back-home-from-about" style="margin-top: 40px;">⌂ BACK TO HOME</a>
            </div>
        </div>
    `;

    // ----- CONTACT PAGE -----
    const contactHTML = `
        <div class="typing-page">
            <div class="log">
                <span class="time">[CONTACT_SIGNAL]</span>
                <h2>// CONNECT_WITH_ME //</h2>
                <div class="contact-card">
                    <p style="font-family: monospace; margin-bottom: 20px;">[ DIGITAL_FOOTPRINT ]</p>
                    <a href="https://www.instagram.com/rezon.5839/" target="_blank" class="insta-btn">
                        📸 INSTAGRAM : @rezon.5839
                    </a>
                    <p style="margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.4);">Creative inquiries | collaboration | direct message</p>
                </div>
                <a href="#" class="btn" id="back-home-from-contact" style="margin-top: 20px;">⌂ BACK TO HOME</a>
            </div>
        </div>
    `;

    // Global variables
    let activeObserver = null;
    let activeTypingTimers = [];

    function clearAllTyping() {
        activeTypingTimers.forEach(timer => clearInterval(timer));
        activeTypingTimers = [];
    }

    // Smooth typing for a single element
    function typeText(element, text, speed = 25) {
        return new Promise((resolve) => {
            let i = 0;
            element.textContent = '';
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    // add cursor at the end
                    const cursorSpan = document.createElement('span');
                    cursorSpan.className = 'cursor';
                    element.appendChild(cursorSpan);
                    resolve();
                }
            }, speed);
            activeTypingTimers.push(timer);
        });
    }

    // Initialize homepage typing with Intersection Observer
    function initHomeTyping() {
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        
        const paragraphs = Array.from(container.querySelectorAll('.typing-paragraph'));
        if (paragraphs.length === 0) return;

        // reset all paragraphs
        paragraphs.forEach(p => {
            const originalText = p.getAttribute('data-text');
            if (originalText) {
                p.textContent = '';
                p.style.opacity = '1';
            }
        });

        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const p = entry.target;
                    const text = p.getAttribute('data-text');
                    if (text && p.textContent.trim() === '') {
                        typeText(p, text, 20);
                        observer.unobserve(p);
                    }
                }
            });
        }, { threshold: 0.3, rootMargin: "0px 0px -20px 0px" });

        paragraphs.forEach(p => observer.observe(p));
        activeObserver = observer;
    }

    // About page: type lines sequentially
    let aboutTypingInterval = null;
    function startAboutTyping() {
        const container = document.getElementById('typing-lines');
        if (!container) return;
        const lines = Array.from(container.querySelectorAll('.typing-line'));
        if (lines.length === 0) return;

        // reset lines
        lines.forEach(line => {
            const original = line.getAttribute('data-text');
            if (original) {
                line.textContent = '';
                line.style.opacity = '1';
            }
        });

        if (aboutTypingInterval) clearInterval(aboutTypingInterval);
        let lineIndex = 0;
        let charIndex = 0;
        let currentLine = lines[lineIndex];
        if (!currentLine) return;
        let fullText = currentLine.getAttribute('data-text') || '';

        function typeNextChar() {
            if (lineIndex >= lines.length) {
                clearInterval(aboutTypingInterval);
                aboutTypingInterval = null;
                return;
            }
            const line = lines[lineIndex];
            const target = line.getAttribute('data-text') || '';
            if (charIndex < target.length) {
                line.textContent = target.substring(0, charIndex + 1);
                charIndex++;
            } else {
                // move to next line
                lineIndex++;
                charIndex = 0;
                if (lineIndex < lines.length) {
                    // just continue
                } else {
                    clearInterval(aboutTypingInterval);
                    aboutTypingInterval = null;
                    // add cursor to last line
                    const lastLine = lines[lines.length - 1];
                    if (lastLine && !lastLine.querySelector('.cursor')) {
                        const cursorSpan = document.createElement('span');
                        cursorSpan.className = 'cursor';
                        lastLine.appendChild(cursorSpan);
                    }
                }
            }
        }
        aboutTypingInterval = setInterval(typeNextChar, 35);
    }

    // Render functions
    function renderHome() {
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        container.innerHTML = homeHTML;
        if (aboutTypingInterval) clearInterval(aboutTypingInterval);
        clearAllTyping();
        initHomeTyping();
    }

    function renderAbout() {
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        container.innerHTML = aboutHTML;
        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();
        if (aboutTypingInterval) clearInterval(aboutTypingInterval);
        setTimeout(() => {
            startAboutTyping();
        }, 80);
        const backBtn = document.getElementById('back-home-from-about');
        if (backBtn) backBtn.onclick = (e) => { e.preventDefault(); renderHome(); };
    }

    function renderContact() {
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        container.innerHTML = contactHTML;
        if (activeObserver) activeObserver.disconnect();
        clearAllTyping();
        if (aboutTypingInterval) clearInterval(aboutTypingInterval);
        const backBtn = document.getElementById('back-home-from-contact');
        if (backBtn) backBtn.onclick = (e) => { e.preventDefault(); renderHome(); };
    }

    // Event binding
    document.getElementById('nav-home')?.addEventListener('click', (e) => { e.preventDefault(); renderHome(); });
    document.getElementById('nav-about')?.addEventListener('click', (e) => { e.preventDefault(); renderAbout(); });
    document.getElementById('nav-contact')?.addEventListener('click', (e) => { e.preventDefault(); renderContact(); });
    document.getElementById('top-home')?.addEventListener('click', (e) => { e.preventDefault(); renderHome(); });
    document.getElementById('top-about')?.addEventListener('click', (e) => { e.preventDefault(); renderAbout(); });
    document.getElementById('top-contact')?.addEventListener('click', (e) => { e.preventDefault(); renderContact(); });
    document.getElementById('manifesto-btn')?.addEventListener('click', (e) => { e.preventDefault(); renderAbout(); });

    // Start
    renderHome();
    // New Projects Page Content
const projectsHTML = `
    <div class="typing-page">
        <div class="log">
            <span class="time">[FETCHING_PROJECT_DATABASE]</span>
            <h2>// ACTIVE_REPOSITORIES //</h2>
            <div id="project-list" class="card-grid">
                </div>
            <a href="#" class="btn" id="back-home-from-projects" style="margin-top: 40px;">⌂ BACK TO HOME</a>
        </div>
    </div>
`;

async function renderProjects() {
    const container = document.getElementById('dynamic-content');
    container.innerHTML = projectsHTML;
    
    // Clear typing and observers
    if (activeObserver) activeObserver.disconnect();
    clearAllTyping();

    // Fetch the data from your projects/list.json
    try {
        const response = await fetch('./projects/list.json');
        const projects = await response.json();
        const listDiv = document.getElementById('project-list');

        listDiv.innerHTML = projects.map(p => `
            <div class="project-card">
                <span class="time" style="font-size:9px">[ ${p.tag} ]</span>
                <h3>${p.title}</h3>
                <p>${p.description}</p>
                <a href="${p.link}" target="_blank" class="btn" style="padding: 5px 15px;">ACCESS_DATA</a>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('project-list').innerHTML = "<p>Error loading projects.</p>";
    }

    document.getElementById('back-home-from-projects').onclick = (e) => { e.preventDefault(); renderHome(); };
}

// Bind the new navigation click
document.getElementById('nav-projects')?.addEventListener('click', (e) => { 
    e.preventDefault(); 
    renderProjects(); 
});
    
</script>
</body>
</html>
